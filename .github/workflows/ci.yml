name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -coverprofile=coverage.out

      - name: Enforce minimum coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/{gsub("%","",$3); print $3}')
          MIN_COVERAGE=10.0
          echo "Total coverage: ${COVERAGE}% (minimum: ${MIN_COVERAGE}%)"
          awk -v c="$COVERAGE" -v m="$MIN_COVERAGE" 'BEGIN { if ((c+0) < (m+0)) { exit 1 } }'

      - name: Build
        run: go build ./cmd/api
