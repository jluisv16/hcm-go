apiVersion: apps/v1
kind: Deployment
metadata:
  name: hcm-go
  labels:
    app: hcm-go
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hcm-go
  template:
    metadata:
      labels:
        app: hcm-go
    spec:
      containers:
        - name: api
          image: hcm-go:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: APP_NAME
              value: hcm-go
            - name: APP_ENV
              value: production
            - name: HTTP_PORT
              value: "8080"
            - name: SHUTDOWN_TIMEOUT
              value: 10s
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
